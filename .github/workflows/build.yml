name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        id: build
        run: |
          set -o pipefail
          RUSTFLAGS="-A dead_code" cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          COMMIT_SHA=${GITHUB_SHA:0:8}
          echo "TAG_NAME=v${VERSION}-${TIMESTAMP}-${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT_MSG=$(git log -1 --oneline --format='%s')
          BODY="Noctolia-gtk v${VERSION}<br><br>Commit: ${COMMIT_MSG}<br>SHA: ${{ github.sha }}"
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: noctolia-gtk-${{ steps.version.outputs.VERSION }}-linux-x86_64
          path: target/release/noctolia-gtk
          retention-days: 30

      - name: Publish release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Noctolia-gtk v${{ steps.version.outputs.VERSION }} (${{ github.sha }})
          prerelease: false
          body: ${{ steps.changelog.outputs.BODY }}
          files: target/release/noctolia-gtk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          ERRORS=$(cat build.log | tail -150)
          PAYLOAD=$(jq -n \
            --arg errors "$ERRORS" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            '{errors: $errors, run_url: $run_url, sha: $sha}')

          SIG=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | \
            awk '{print "sha256="$2}')

          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true
