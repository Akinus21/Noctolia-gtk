name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        id: build
        run: |
          set -o pipefail
          RUSTFLAGS="-A dead_code" cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: noctolia-gtk-build
          path: target/release/noctolia-gtk
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          ERRORS=$(cat build.log | tail -150)
          PAYLOAD=$(jq -n \
            --arg errors "$ERRORS" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            '{errors: $errors, run_url: $run_url, sha: $sha}')

          SIG=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | \
            awk '{print "sha256="$2}')

          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "${{ secrets.WEBHOOK_URL }}" || true
